<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupons World</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}
.header {
    background: #ff6f00;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}
.banner {
    background: url('https://via.placeholder.com/1200x300') no-repeat center;
    background-size: cover;
    height: 200px;
}
.section {
    padding: 20px;
}
.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.button {
    display: inline-block;
    padding: 10px 15px;
    background: #28a745;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
</style>

</head>

<body>

<div class="header">
🔥 Coupons World - Best Deals & Cashback
</div>

<div class="banner"></div>

<div class="section">
    <h2>Top Deals Today</h2>

    <div class="card">
        <h3>Amazon Sale - Up to 70% OFF</h3>
        <p>Grab best offers on electronics & more</p>
        <a class="button" href="#" target="_blank">Get Deal</a>
    </div>

    <div class="card">
        <h3>Flipkart Big Discounts</h3>
        <p>Latest deals on mobiles & fashion</p>
        <a class="button" href="#" target="_blank">Get Deal</a>
    </div>

    <div class="card">
        <h3>Myntra Fashion Sale</h3>
        <p>Flat 50% OFF on clothing</p>
        <a class="button" href="#" target="_blank">Get Deal</a>
    </div>

</div>

</body>
</html>
