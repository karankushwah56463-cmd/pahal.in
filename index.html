<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CouponsWorld</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#f8f9fa;
    font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
    background:#ff6f00;
}
.navbar-brand {
    color:white !important;
    font-weight:bold;
}

/* HERO */
.hero {
    background: linear-gradient(135deg,#ff6f00,#ff9800);
    color:white;
    padding:60px 20px;
    text-align:center;
}
.hero h1 {
    font-weight:bold;
}

/* CARDS */
.card {
    border:none;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}
.card:hover {
    transform:translateY(-5px);
}
.card img {
    height:180px;
    object-fit:cover;
}

.btn-deal {
    background:#28a745;
    color:white;
    width:100%;
    border-radius:8px;
}

/* SECTION */
.section-title {
    font-weight:bold;
    margin:30px 0 15px;
}

/* FOOTER */
.footer {
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand" href="#">🔥 CouponsWorld</a>
</div>
</nav>

<p>Save big on Amazon, Flipkart & more</p>
</div>

<div class="container">

<div class="row g-4">

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<div class="p-3">
<h6>iPhone Deals</h6>
<p>Up to 30% OFF</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<div class="p-3">
<h6>Laptop Sale</h6>
<p>Flat ₹5000 OFF</p>
<a href="#" class="btn btn-deal">Get Deal</a>

</div>
</div>

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<div class="p-3">
<h6>Smart Watch</h6>
<p>50% Discount</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
<div class="p-3">
<h6>Headphones</h6>
<p>Best Offers</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>
</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 CouponsWorld | All Rights Reserved
</div>

</body>
</html>
