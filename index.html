<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CouponsWorld</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f4f4; }

.header {
    background:#ff6f00;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.logo { font-size:20px; font-weight:bold; }

.banner {
    background: url('https://images.unsplash.com/photo-1607083206968-13611e3d76db');
    background-size:cover;
    color:white;
    padding:80px 20px;
    text-align:center;
}

.banner h1 {
    background: rgba(0,0,0,0.6);
    display:inline-block;
    padding:10px;
}

.card {
    border:none;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.card img {
    height:180px;
    object-fit:cover;
}

.btn-deal {
    background:#28a745;
    color:white;
    width:100%;
}

.section-title {
    font-weight:bold;
    margin:20px 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">🔥 CouponsWorld</div>
<div>Login</div>
</div>

<!-- BANNER -->
<div class="banner">
<h1>Best Deals & Cashback Offers 💰</h1>
<p>Save big on Amazon, Flipkart & more</p>
</div>

<!-- DEALS -->
<div class="container">

<h3 class="section-title">🔥 Trending Deals</h3>

<div class="row g-3">

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<div class="p-2">
<h6>iPhone Deals</h6>
<p>Up to 30% OFF</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<div class="p-2">
<h6>Laptop Sale</h6>
<p>Flat ₹5000 OFF</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<div class="p-2">
<h6>Smart Watch</h6>
<p>50% Discount</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
<div class="p-2">
<h6>Headphones</h6>
<p>Best Offers</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>
</div>

</div>

</div>

</body>
</html>
