<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CouponsWorld</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f5f5; }

.header {
    background:#ff6f00;
    color:white;
    padding:15px;
    font-size:22px;
    text-align:center;
}

.banner {
    background: linear-gradient(to right,#ff6f00,#ff9800);
    color:white;
    padding:40px;
    text-align:center;
}

.card img { height:150px; object-fit:cover; }

.btn-deal {
    background:green;
    color:white;
}
</style>
</head>

<body>

<div class="header">
🔥 CouponsWorld - Best Deals
</div>

<div class="banner">
<h2>Earn Cashback on Every Deal 💰</h2>
<p>Top offers from Amazon & Flipkart</p>
</div>

<div class="container mt-4">
<div class="row">

<div class="col-md-3">
<div class="card p-2">
<img src="https://via.placeholder.com/300">
<h5>Amazon Sale</h5>
<p>Up to 70% OFF</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>

<div class="col-md-3">
<div class="card p-2">
<img src="https://via.placeholder.com/300">
<h5>Flipkart Deals</h5>
<p>Best Mobile Offers</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>

<div class="col-md-3">
<div class="card p-2">
<img src="https://via.placeholder.com/300">
<h5>Myntra Sale</h5>
<p>Flat 50% OFF</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>

<div class="col-md-3">
<div class="card p-2">
<img src="https://via.placeholder.com/300">
<h5>Ajio Offers</h5>
<p>Extra Cashback</p>
<a href="#" class="btn btn-deal">Get Deal</a>
</div>
</div>

</div>
</div>

</body>
</html>
